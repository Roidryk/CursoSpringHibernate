<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<center>
		<form action="informe" method="get">
			<input type="date" name="fecha1">&nbsp;&nbsp;&nbsp;&nbsp;<input type="date" name="fecha2">
			<br><br>
			
			<div th:if="${ventas}">
			<table border="1">
			
			<tr><th>Usuario<th>Libro<th>Fecha<th>
			<tr th:each="v:${ventas}">
			<td th:text="v:${cliente.usuario}"></td>
	 	    <td th:text="v:${libro.titulo}">></td>	
			<td th:text="v:${venta.fecha}"></td>
			<td th:text="v:${#temporals.format(v.fecha,'dd/MM/yyyy')}"></td>
			</tr>
			
			</table>
			
			</div>
			
			<input type="submit" value="Informe">
		</form>
	</center>
</body>
</html>
