<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>

<center>

h2 th:text="${session.usuario}"></h2>
	<center>
		<form action="libros" method="get">
			Seleccione Tema:
			<select name="temaSel">
				<option value="0" th:selected="${idTemaSel==0}" >-Todos-</option>
				<option th:each="c:${temas}" th:selected="${idTemaSel==c.idTema}" th:text="${c.tema}" th:value="${c.idTema}"></option>
			</select><br><br>
			<input type="submit" value="Ver libros">
		</form>
		<br><br>
		<table border="1" th:if="${libros}">
		//Comprueba si lo que evalua no existe se interpreta como falso
			<tr><th>Título</th><th>Autor</th><th>Precio</th></tr>
			<tr th:each="a:${libros}">
				<td th:text="${a.titulo}"></td>
				<td th:text="${a.autor}"></td>
				<td th:text="${a.precio}"></td>
				<td th:text="${a.nombreTema}"></td>
				<td th:href="@añadir{isbn=${a.isbn})}">Añadir</td>
			</tr>
		</table>
		
		<div th:if="${session.carrito}">
	<h2>Carrito</h2>
	<center>
		<form action="añadir" method="get">
		<table border="1" >
			<tr><th>Título</th><th>Autor</th><th>Precio</th></tr>
			<tr th:each="a,1:${session.carrito}">
				<td th:text="${a.titulo}"></td>
				<td th:text="${a.autor}"></td>
				<td th:text="${a.precio}"></td>
				<td th:text="${a.nombreTema}"></td>
				<td th:text="${a.temaRelacionado.temas}"></td>
				 
				<td><a th:href="@{eliminar(posicion=${a.posicion})}">Eliminar</a>
			</tr>
		</table>
	
		</div>
		
		<br>
		<a href="goLogin">Volver</a>
	
	</center>

</body>
</html>
