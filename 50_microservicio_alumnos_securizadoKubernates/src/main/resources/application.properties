spring.application.name=08_protopito_buscador_spring_boot

server.port=8005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${HOST_DB}:${PORT_DB}/alumnoscursos
spring.datasource.username=${USER_DB}
spring.datasource.password=${PASS_DB}
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

server.servlet.context-path=/escuela


db.security.driver=com.mysql.cj.jdbc.Driver
db.security.url=jdbc:mysql://${HOST_DB}:${PORT_DB}/springsecurity
db.security.user=${USER_DB}
db.security.password=${PASS_DB}

